<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PDF 파일을 고화질 이미지로 변환하고 ZIP 파일로 한 번에 다운로드하세요. 서버 업로드 없이 브라우저에서 안전하게 작업합니다.">
    <meta name="keywords" content="PDF 이미지 변환, PDF to JPG, PDF to PNG, PDF 변환기, 무료 PDF 도구">
    <meta name="author" content="Tools Portal">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://useful-tools-portal.vercel.app/pdf-to-image/index.html">
    <meta property="og:title" content="PDF 이미지 변환기 - 유틸리티 포털">
    <meta property="og:description" content="PDF 파일을 고화질 이미지로 변환하고 ZIP 파일로 한 번에 다운로드하세요.">
    <meta property="og:image" content="https://useful-tools-portal.vercel.app/og-image.png">

    <link rel="icon" href="https://fav.farm/🛠️">

    <link rel="stylesheet" href="../globals.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="../shared-components.js"></script>
</head>

<body>
    <global-header></global-header>

    <div class="container" style="margin-top: 40px;">
        <header>
            <h1>PDF 이미지 변환기</h1>
            <p>PDF의 각 페이지를 고화질 PNG 이미지로 변환하여 ZIP으로 압축해 드립니다.</p>
        </header>

        <main>
            <section class="upload-section" id="drop-zone">
                <input type="file" id="file-input" accept="application/pdf" hidden>
                <div class="upload-content">
                    <div class="icon">📄</div>
                    <p>PDF 파일을 클릭하거나 여기에 드래그하세요</p>
                    <span>서버에 저장되지 않아 안전합니다</span>
                </div>
            </section>

            <section class="file-info-section hidden" id="file-info">
                <div class="info-card">
                    <div class="file-details">
                        <span class="file-name" id="display-file-name">파일명.pdf</span>
                        <span class="page-count" id="display-page-count">총 0페이지</span>
                    </div>

                    <div class="format-selection">
                        <label for="image-format">저장 포맷 선택:</label>
                        <select id="image-format">
                            <option value="png">PNG (고화질, 투명 지원)</option>
                            <option value="jpeg">JPG (적은 용량)</option>
                        </select>
                    </div>
                    
                    <div class="progress-container hidden" id="progress-container">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="progress-bar"></div>
                        </div>
                        <span class="progress-text" id="progress-text">0% 완료</span>
                    </div>

                    <div class="actions">
                        <button id="download-zip-btn" class="primary-btn" disabled>모든 페이지 ZIP으로 다운로드</button>
                        <button id="reset-btn" class="secondary-btn">다시 하기</button>
                    </div>
                </div>
            </section>

            <section class="preview-section hidden" id="preview-area">
                <h3>미리보기 (첫 페이지)</h3>
                <div class="preview-canvas-container">
                    <canvas id="preview-canvas"></canvas>
                </div>
            </section>
        </main>
    </div>
    <global-footer></global-footer>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <script src="script.js"></script>
</body>

</html>
