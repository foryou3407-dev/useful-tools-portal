<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PDF 파일을 자유롭게 합치거나 나누세요. 서버 업로드 없이 브라우저에서 안전하게 PDF 문서를 편집할 수 있는 무료 도구입니다.">
    <meta name="keywords" content="PDF 합치기, PDF 나누기, PDF 편집기, PDF 병합, PDF 추출, 무료 PDF 도구">
    <meta name="author" content="Tools Portal">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://useful-tools-portal.vercel.app/pdf-editor/index.html">
    <meta property="og:title" content="PDF 편집기 (합치기/나누기) - 유틸리티 포털">
    <meta property="og:description" content="PDF 파일을 안전하게 합치거나 원하는 페이지만 나누어 추출하세요.">
    <meta property="og:image" content="https://useful-tools-portal.vercel.app/og-image.png">

    <link rel="icon" href="https://fav.farm/🛠️">

    <link rel="stylesheet" href="../globals.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="../shared-components.js"></script>
</head>

<body>
    <global-header></global-header>

    <div class="container" style="margin-top: 40px;">
        <header>
            <h1>PDF 편집기</h1>
            <p>여러 PDF를 하나로 합치거나, 원하는 페이지만 쏙쏙 나누어 보세요.</p>
        </header>

        <main>
            <!-- 탭 메뉴 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="merge">PDF 합치기 (Merge)</button>
                <button class="tab-btn" data-tab="split">PDF 나누기 (Split)</button>
            </div>

            <!-- 합치기 탭 콘텐츠 -->
            <section id="merge-content" class="tab-content active">
                <div class="upload-section" id="merge-drop-zone">
                    <input type="file" id="merge-file-input" accept="application/pdf" multiple hidden>
                    <div class="upload-content">
                        <div class="icon">📂</div>
                        <p>여러 PDF 파일을 클릭하거나 여기에 드래그하세요</p>
                        <span>파일 순서를 자유롭게 조정할 수 있습니다</span>
                    </div>
                </div>

                <div id="merge-list-container" class="hidden">
                    <div class="info-card">
                        <h3>선택된 파일 목록</h3>
                        <p class="info-text">순서를 드래그하거나 화살표를 눌러 조정하세요.</p>
                        <ul id="merge-file-list" class="file-list"></ul>
                        
                        <div class="actions">
                            <button id="merge-btn" class="primary-btn">하나의 PDF로 병합하기</button>
                            <button id="merge-reset-btn" class="secondary-btn">초기화</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 나누기 탭 콘텐츠 -->
            <section id="split-content" class="tab-content">
                <div class="upload-section" id="split-drop-zone">
                    <input type="file" id="split-file-input" accept="application/pdf" hidden>
                    <div class="upload-content">
                        <div class="icon">✂️</div>
                        <p>나눌 PDF 파일을 클릭하거나 여기에 드래그하세요</p>
                        <span>원하는 페이지 범위만 추출할 수 있습니다</span>
                    </div>
                </div>

                <div id="split-info-container" class="hidden">
                    <div class="info-card">
                        <div class="file-details">
                            <span class="file-name" id="split-file-name">파일명.pdf</span>
                            <span class="page-count" id="split-page-count">총 0페이지</span>
                        </div>
                        
                        <div class="range-input-group">
                            <label for="page-range">추출할 페이지 범위:</label>
                            <input type="text" id="page-range" placeholder="예: 1-3, 5, 8-10">
                            <p class="help-text">콤마(,)와 하이픈(-)을 사용하여 범위를 지정하세요.</p>
                        </div>

                        <div class="actions">
                            <button id="split-btn" class="primary-btn">선택한 페이지만 추출하기</button>
                            <button id="split-reset-btn" class="secondary-btn">다시 하기</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <global-footer></global-footer>

    <!-- Libraries -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <script src="script.js?v=2"></script>
</body>

</html>
